[build]
  base    = "sentinel-production-microstructure-monitor"
  command = "npm install && npm run build"
  publish = "dist"

# ── SPA fallback ────────────────────────────────────────────────────────────
# All routes (including /) return index.html — lets React Router handle routing
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

# ── Long-lived cache for Vite hashed assets ─────────────────────────────────
# Vite produces content-hashed filenames (e.g. /assets/index-Bxk3a9vf.js).
# These NEVER change content for a given hash, so we can cache them forever.
# This fixes intermittent load failures caused by Netlify CDN revalidation
# on non-cached first loads.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── No cache for index.html ──────────────────────────────────────────────────
# index.html must always be fresh so new deploys are picked up immediately.
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# ── Security headers ─────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
