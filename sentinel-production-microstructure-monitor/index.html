<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <title>SENTINEL | Market Microstructure Monitor</title>

  <!--
    REMOVED: cdn.tailwindcss.com  → Caused FOUC on cold load (Bug 3)
    REMOVED: importmap (esm.sh)   → Conflicted with Vite bundle (Bug 1)
    REMOVED: /index.css link      → File didn't exist, caused 404 (Bug 2)

    Tailwind is now processed at BUILD TIME via PostCSS (tailwind.config.js).
    The index.css entry is imported in index.tsx so Vite handles it correctly.
  -->

  <!-- Google Fonts — preconnect reduces TTFB for font files -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div id="root"></div>
  <!-- Vite resolves this at build time — DO NOT add importmap or CDN scripts -->
  <script type="module" src="/index.tsx"></script>
</body>
</html>
